<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<div class="calc">
    <p>dayOneCalculator</p>
    <div class="display">

    </div>

        <div class="btn">8</div>
        <div class="btn">9</div>
        <div class="btn gold">*</div>

        <div class="btn">4</div>
        <div class="btn">5</div>
        <div class="btn">6</div>
        <div class="btn gold">-</div>

        <div class="btn">1</div>
        <div class="btn">2</div>
        <div class="btn">3</div>
        <div class="btn gold">+</div>

        <div class="btn reset">AC</div>
        <div class="btn">0</div>

    </div>
</div>
<script src="script.js"></script>

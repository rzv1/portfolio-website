<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<div class="page">
    <div class="command-panel">
        <p>Commands Panel</p>
        <form onsubmit="handleSubmit(event)">
            <input type="number" name="size" min="16" max="124" required>
            <button type="submit">Set size</button>
        </form>
        <div class="color-pallete">
            <div class="color red" data-color="red"></div>
            <div class="color green" data-color="green"></div>
            <div class="color blue" data-color="blue"></div>
            <div class="color yellow" data-color="yellow"></div>
            <div class="color cyan" data-color="cyan"></div>
            <div class="color magenta" data-color="magenta"></div>
            <button id="eraser" class="color eraser">Eraser</button>
        </div>
        <button id="reset">
            Reset
        </button>
    </div>
    <div class="grid">

    </div>
</div>
<script src="script.js"></script>
</body>
</html>
